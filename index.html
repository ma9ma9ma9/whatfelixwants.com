    <style>
    :root {
      --paper:   #fdf8f0;

      --lined:   #e0d8c8;

      --ink-light: #4a5a8b;

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: auto;
      min-height: 100%;
    }

    body {
      background: var(--paper);
      min-height: 100%;
      font-family: 'Patrick Hand', cursive;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      padding: 13px;
      margin: 0;
      position: relative;
      overflow-x: hidden;
      box-sizing: border-box;
    }

    .sheet { position: relative; z-index: 1; width: 100%; }

    /* ── THE PAPER SHEET ── */
    .sheet {
      background: var(--paper);
      width: 100%;
      min-height: 100vh;
      position: relative;
      animation: dropIn 0.55s cubic-bezier(.22,1,.36,1) both;
    }

    }

    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-24px) rotate(-0.4deg); }
      to   { opacity: 1; transform: translateY(0) rotate(0deg); }
    }

    /* ── RAINBOW STRIPE BORDER ── */
    .rainbow-border {
      display: none;
    }

    /* Full rainbow stripe border fixed to viewport */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 2px;
      padding: 13px;
      background: repeating-linear-gradient(
        -45deg,
        #e05555 0px,   #e05555 10px,
        #f5c842 10px,  #f5c842 20px,
        #5aaa6e 20px,  #5aaa6e 30px,
        #4a90d9 30px,  #4a90d9 40px,
        #e87aaa 40px,  #e87aaa 50px,
        #f0854a 50px,  #f0854a 60px
      );
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── INNER FRAME ── */
    .inner {
      padding: 1.6rem 1.8rem 1.8rem;
      border: 2.5px solid var(--ink);
      margin: 0;
      border-radius: 1px;
      position: relative;
      z-index: 3;
    }

    /* ── TITLE ── */
    h1 {
      font-family: 'Schoolbell', cursive;
      font-size: clamp(1rem, 6vw, 3rem);
      color: var(--ink);
      text-align: center;
      line-height: 1.1;
      margin-bottom: 1.2rem;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    /* ── NAME / AGE ROW ── */
    .name-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem 2rem;
      font-size: 1.1rem;
      color: var(--ink-light);
      margin-bottom: 1.5rem;
      align-items: baseline;
    }

    .fill-line {
      display: inline-flex;
      align-items: baseline;
      gap: 0.25rem;
      white-space: nowrap;
    }

    .uval {
      font-family: 'Schoolbell', cursive;
      font-size: 1.05rem;
      color: var(--ink);
      border-bottom: 2px solid var(--ink);
      min-width: 110px;
      padding: 0 3px 1px;
      display: inline-block;
      text-align: center;
    }
    .uval.short { min-width: 44px; }

    /* ── GIFT CARDS GRID ── */
    .gifts-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.6rem;
      margin-bottom: 1.4rem;
    }

    .gift-wrap { position: relative; }

    .gift-card {
      border: 2.5px solid var(--ink);
      background: transparent;
      border-radius: 4px;
      position: relative;
    }

    .gift-label {
      font-family: 'Schoolbell', cursive;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink);
      text-align: center;
      padding: 0.4rem 0.4rem 0.3rem;
      border-bottom: 2px solid var(--ink);
      background: transparent;
    }



    .gift-body {
      padding: 0.4rem 0.75rem 0.5rem;
      position: relative;
    }

    .ruled-line {
      border-bottom: 1.5px solid var(--lined);
      height: 1.85rem;
      display: flex;
      align-items: flex-end;
      padding-bottom: 2px;
      font-family: 'Schoolbell', cursive;
      font-size: 1.1rem;
      color: var(--ink);
      line-height: 1;
    }

    /* ── FOOTER ── */
    .fav-title {
      font-family: 'Schoolbell', cursive;
      font-size: 1.1rem;
      text-align: center;
      color: var(--ink);
      letter-spacing: 0.05em;
      margin-bottom: 0.6rem;
    }

    .fav-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      column-gap: 1.2rem;
      row-gap: 0;
    }

    @media (max-width: 380px) {
      .fav-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .fav-row {
      display: flex;
      align-items: flex-end;
      border-bottom: 1.5px solid var(--lined);
      height: 1.85rem;
      gap: 0.25rem;
      font-size: 0.82rem;
      color: var(--ink-light);
    }

    .fv {
      font-family: 'Schoolbell', cursive;
      font-size: 0.92rem;
      color: var(--ink);
      flex: 1;
      padding-bottom: 1px;
      line-height: 1;
    }

    /* ── FOOTER ── */
    .sheet-footer {
      text-align: center;
      padding: 0.8rem 0 0.1rem;
      font-size: 0.7rem;
      color: var(--border);
      font-family: 'Patrick Hand', cursive;
    }
  </style>
</head>
